name: Attendance CI/CD 🚀

on:
  push:
    branches: [ "main", "feature/dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- CI STAGE: Testing & Linting ---
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Syntax Check
        run: |
          python -m py_compile main.py utils/attendance.py utils/input.py

      - name: Logic Test
        run: |
          # This runs your main.py to ensure no runtime errors
          # We use "printf" to simulate your inputs (Conducted: 30, Attended: 25, Miss: 5)
          printf "30\n25\n5\n" | python main.py

  # --- CD STAGE: Deployment ---
  deploy-ready:
    needs: quality-check # Only runs if CI passes!
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Create Release Artifact
        run: echo "Code is verified and ready for production."